name: Daily Deployment
on:
  schedule:
    - cron: '0 4 * * *'
jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Call Vercel Webhook
        env:
          VERCEL_PRODUCTION_BUILD_HOOK: ${{ secrets.VERCEL_PRODUCTION_BUILD_HOOK }}
        run: curl -X GET "$VERCEL_PRODUCTION_BUILD_HOOK"
